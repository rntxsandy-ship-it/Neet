<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEET Mock Test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --card: #1a2235;
      --border: #2a3755;
      --accent: #00d4aa;
      --accent2: #4f8aff;
      --danger: #ff4d6d;
      --warn: #ffc145;
      --text: #e8edf7;
      --muted: #8895b0;
      --physics: #4f8aff;
      --chemistry: #ff7c5c;
      --botany: #00d4aa;
      --zoology: #c77dff;
      --attempted: #00d4aa;
      --review: #c77dff;
      --unattempted: #2a3755;
      --current: #ffc145;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Source Sans 3', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--accent);
    }
    .logo span { color: var(--text); }

    #timer-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 6px 18px;
    }
    #timer-box svg { color: var(--accent); }
    #timer {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 3px;
      min-width: 90px;
      text-align: center;
    }
    #timer.warn { color: var(--warn); }
    #timer.danger { color: var(--danger); animation: pulse 1s infinite; }

    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.5 } }

    #submit-btn {
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      padding: 8px 22px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    #submit-btn:hover { opacity: 0.85; transform: scale(1.03); }

    /* ── SUBJECT TABS ── */
    #subject-tabs {
      display: flex;
      gap: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }
    .tab-btn {
      flex: 1;
      min-width: 120px;
      padding: 10px 0;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      color: var(--muted);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn[data-subj="Physics"].active  { color: var(--physics);   border-color: var(--physics); }
    .tab-btn[data-subj="Chemistry"].active{ color: var(--chemistry); border-color: var(--chemistry); }
    .tab-btn[data-subj="Botany"].active   { color: var(--botany);    border-color: var(--botany); }
    .tab-btn[data-subj="Zoology"].active  { color: var(--zoology);   border-color: var(--zoology); }
    .tab-btn:hover { color: var(--text); }

    /* ── MAIN LAYOUT ── */
    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - 107px);
    }

    /* ── SIDEBAR ── */
    #sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 16px;
    }
    .sidebar-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .legend-dot {
      width: 12px; height: 12px;
      border-radius: 3px;
    }
    .legend-dot.attempted   { background: var(--attempted); }
    .legend-dot.review      { background: var(--review); }
    .legend-dot.unattempted { background: var(--unattempted); border: 1px solid var(--border); }
    .legend-dot.current     { background: var(--current); }

    #sidebar-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
    }
    .q-num-btn {
      width: 100%;
      aspect-ratio: 1;
      border: none;
      border-radius: 6px;
      background: var(--unattempted);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, background 0.15s;
    }
    .q-num-btn:hover { transform: scale(1.12); filter: brightness(1.3); }
    .q-num-btn.attempted   { background: var(--attempted); color: var(--bg); }
    .q-num-btn.review      { background: var(--review); color: #fff; }
    .q-num-btn.current     { outline: 2px solid var(--current); color: var(--current); }

    /* ── QUESTION PANEL ── */
    #question-panel {
      flex: 1;
      overflow-y: auto;
      padding: 28px 40px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .q-meta {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .q-num-badge {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 14px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 700;
    }
    .subj-badge {
      border-radius: 6px;
      padding: 3px 12px;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 1px;
    }
    .subj-badge.Physics   { background: rgba(79,138,255,0.15); color: var(--physics); }
    .subj-badge.Chemistry { background: rgba(255,124,92,0.15); color: var(--chemistry); }
    .subj-badge.Botany    { background: rgba(0,212,170,0.15);  color: var(--botany); }
    .subj-badge.Zoology   { background: rgba(199,125,255,0.15);color: var(--zoology); }

    .q-text {
      font-size: 1.15rem;
      line-height: 1.75;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
    }

    .options-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .option-label {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 14px 20px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .option-label:hover { border-color: var(--accent2); background: rgba(79,138,255,0.06); }
    .option-label input[type="radio"] { display: none; }
    .option-label.selected {
      border-color: var(--accent);
      background: rgba(0,212,170,0.08);
    }
    .option-key {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .option-label.selected .option-key {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
    }

    /* ── NAV BUTTONS ── */
    .nav-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .nav-btn {
      padding: 10px 22px;
      border-radius: 9px;
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .nav-btn:hover { border-color: var(--accent2); color: var(--accent2); }
    .nav-btn.primary { background: var(--accent2); border-color: var(--accent2); color: #fff; }
    .nav-btn.primary:hover { opacity: 0.85; }
    .nav-btn.review-btn { border-color: var(--review); color: var(--review); }
    .nav-btn.review-btn:hover { background: rgba(199,125,255,0.1); }
    .nav-btn.clear-btn { border-color: var(--danger); color: var(--danger); }
    .nav-btn.clear-btn:hover { background: rgba(255,77,109,0.1); }

    /* ── STATS BAR ── */
    #stats-bar {
      display: flex;
      gap: 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 10px 24px;
      font-size: 0.85rem;
      flex-wrap: wrap;
    }
    .stat { display: flex; align-items: center; gap: 6px; color: var(--muted); }
    .stat-dot { width: 10px; height: 10px; border-radius: 3px; }
    .stat span { color: var(--text); font-weight: 600; }

    /* ── MODAL ── */
    #modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 999;
      align-items: center; justify-content: center;
    }
    #modal-overlay.show { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 40px;
      max-width: 420px;
      width: 90%;
      text-align: center;
    }
    .modal h2 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .modal p { color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
    .modal-btns { display: flex; gap: 12px; justify-content: center; }
    .modal-btns button {
      padding: 11px 28px;
      border-radius: 9px;
      border: none;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
      transition: opacity 0.2s;
    }
    .modal-btns button:hover { opacity: 0.82; }
    #confirm-submit { background: var(--accent); color: var(--bg); }
    #cancel-submit  { background: var(--card); color: var(--text); border: 1.5px solid var(--border); }

    /* Loading */
    #loading {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 9999;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p style="color:var(--muted);font-family:'Rajdhani',sans-serif;letter-spacing:2px;">LOADING QUESTIONS…</p>
</div>

<header>
  <div class="logo">NEET <span>MOCK TEST</span></div>
  <div id="timer-box">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <div id="timer">180:00</div>
  </div>
  <button id="submit-btn" onclick="openSubmitModal()">SUBMIT TEST</button>
</header>

<div id="subject-tabs">
  <button class="tab-btn active" data-subj="Physics"   onclick="switchSubject('Physics')">PHYSICS</button>
  <button class="tab-btn"        data-subj="Chemistry" onclick="switchSubject('Chemistry')">CHEMISTRY</button>
  <button class="tab-btn"        data-subj="Botany"    onclick="switchSubject('Botany')">BOTANY</button>
  <button class="tab-btn"        data-subj="Zoology"   onclick="switchSubject('Zoology')">ZOOLOGY</button>
</div>

<div class="main-layout">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-legend">
      <div class="legend-item"><div class="legend-dot attempted"></div> Answered</div>
      <div class="legend-item"><div class="legend-dot review"></div> Review</div>
      <div class="legend-item"><div class="legend-dot unattempted"></div> Not visited</div>
      <div class="legend-item"><div class="legend-dot current"></div> Current</div>
    </div>
    <div id="sidebar-grid"></div>
  </div>

  <!-- QUESTION AREA -->
  <div id="question-panel">
    <div class="q-meta">
      <div class="q-num-badge" id="q-num-badge">Q 1</div>
      <div class="subj-badge" id="q-subj-badge">Physics</div>
    </div>
    <div class="q-text" id="q-text">Loading…</div>
    <div class="options-list" id="options-list"></div>
    <div class="nav-row">
      <button class="nav-btn" onclick="prevQuestion()">← PREV</button>
      <button class="nav-btn primary" onclick="nextQuestion()">NEXT →</button>
      <button class="nav-btn review-btn" onclick="markReview()">MARK FOR REVIEW</button>
      <button class="nav-btn clear-btn" onclick="clearAnswer()">CLEAR ANSWER</button>
    </div>
  </div>
</div>

<!-- STATS BAR -->
<div id="stats-bar">
  <div class="stat"><div class="stat-dot" style="background:var(--attempted)"></div> Answered: <span id="stat-answered">0</span></div>
  <div class="stat"><div class="stat-dot" style="background:var(--unattempted);border:1px solid var(--border)"></div> Unanswered: <span id="stat-unanswered">180</span></div>
  <div class="stat"><div class="stat-dot" style="background:var(--review)"></div> For Review: <span id="stat-review">0</span></div>
  <div class="stat" style="margin-left:auto;color:var(--muted)">
    Marking: <span style="color:var(--attempted)">+4</span> correct &nbsp;|&nbsp;
    <span style="color:var(--danger)">−1</span> wrong &nbsp;|&nbsp;
    <span style="color:var(--muted)">0</span> skipped
  </div>
</div>

<!-- SUBMIT MODAL -->
<div id="modal-overlay">
  <div class="modal">
    <h2>Submit Test?</h2>
    <p id="modal-info">Please review your progress before submitting.</p>
    <div class="modal-btns">
      <button id="confirm-submit" onclick="submitTest()">YES, SUBMIT</button>
      <button id="cancel-submit"  onclick="closeModal()">CANCEL</button>
    </div>
  </div>
</div>

<script>
  const TOTAL_TIME = 180 * 60;   // seconds
  const STORAGE_KEY = 'neet_state';

  let questions = [];
  let answers   = {};   // { qid: optionIndex }
  let reviewed  = {};   // { qid: true }
  let currentIdx = 0;   // index in questions[]
  let currentSubject = 'Physics';
  let timerInterval;
  let timeLeft;

  // ── Persist / Restore ──
  function saveState() {
    const state = { answers, reviewed, timeLeft };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function loadState() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const s = JSON.parse(raw);
    answers  = s.answers  || {};
    reviewed = s.reviewed || {};
    timeLeft = s.timeLeft != null ? s.timeLeft : TOTAL_TIME;
    return true;
  }

  // ── Timer ──
  function startTimer() {
    timerInterval = setInterval(() => {
      timeLeft--;
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        submitTest(true);
        return;
      }
      saveState();
      renderTimer();
    }, 1000);
  }

  function renderTimer() {
    const m = String(Math.floor(timeLeft / 60)).padStart(3, ' ');
    const s = String(timeLeft % 60).padStart(2, '0');
    const el = document.getElementById('timer');
    el.textContent = `${Math.floor(timeLeft/60)}:${String(timeLeft%60).padStart(2,'0')}`;
    el.className = timeLeft <= 300 ? 'danger' : timeLeft <= 1800 ? 'warn' : '';
  }

  // ── Load Questions ──
  async function init() {
    const res = await fetch('/api/questions');
    questions = await res.json();

    const existed = loadState();
    if (!existed) timeLeft = TOTAL_TIME;

    document.getElementById('loading').style.display = 'none';
    renderSidebar();
    gotoQuestion(0);
    startTimer();
    renderTimer();
    updateStats();
  }

  // ── Sidebar ──
  function renderSidebar() {
    const grid = document.getElementById('sidebar-grid');
    grid.innerHTML = '';
    const filtered = questions.filter(q => q.subject === currentSubject);
    filtered.forEach((q, i) => {
      const btn = document.createElement('button');
      btn.className = 'q-num-btn';
      btn.textContent = q.num;
      btn.dataset.qid = q.id;
      btn.addEventListener('click', () => {
        const idx = questions.findIndex(x => x.id === q.id);
        gotoQuestion(idx);
      });
      updateBtnState(btn, q);
      grid.appendChild(btn);
    });
  }

  function updateBtnState(btn, q) {
    btn.className = 'q-num-btn';
    const qid = String(q.id);
    if (questions[currentIdx] && questions[currentIdx].id === q.id) btn.classList.add('current');
    else if (reviewed[qid]) btn.classList.add('review');
    else if (answers[qid] !== undefined) btn.classList.add('attempted');
  }

  function refreshSidebarBtns() {
    const btns = document.querySelectorAll('.q-num-btn');
    const filtered = questions.filter(q => q.subject === currentSubject);
    btns.forEach((btn, i) => {
      const q = filtered[i];
      if (q) updateBtnState(btn, q);
    });
  }

  // ── Navigate ──
  function gotoQuestion(idx) {
    currentIdx = Math.max(0, Math.min(idx, questions.length - 1));
    const q = questions[currentIdx];
    if (q.subject !== currentSubject) switchSubject(q.subject, false);
    renderQuestion(q);
    refreshSidebarBtns();
  }

  function nextQuestion() {
    if (currentIdx < questions.length - 1) gotoQuestion(currentIdx + 1);
  }
  function prevQuestion() {
    if (currentIdx > 0) gotoQuestion(currentIdx - 1);
  }

  // ── Subject Tabs ──
  function switchSubject(subj, jump = true) {
    currentSubject = subj;
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.subj === subj);
    });
    renderSidebar();
    if (jump) {
      const firstIdx = questions.findIndex(q => q.subject === subj);
      if (firstIdx !== -1) gotoQuestion(firstIdx);
    }
  }

  // ── Render Question ──
  function renderQuestion(q) {
    document.getElementById('q-num-badge').textContent = `Q ${q.num}`;
    const subjBadge = document.getElementById('q-subj-badge');
    subjBadge.textContent = q.subject;
    subjBadge.className = `subj-badge ${q.subject}`;
    document.getElementById('q-text').textContent = q.question;

    const list = document.getElementById('options-list');
    list.innerHTML = '';
    const keys = ['A','B','C','D'];
    const saved = answers[String(q.id)];

    q.options.forEach((opt, i) => {
      const lbl = document.createElement('label');
      lbl.className = 'option-label' + (saved === i ? ' selected' : '');
      lbl.innerHTML = `
        <input type="radio" name="option" value="${i}" ${saved === i ? 'checked' : ''}>
        <div class="option-key">${keys[i]}</div>
        <div>${opt}</div>
      `;
      lbl.addEventListener('click', () => selectOption(q, i));
      list.appendChild(lbl);
    });
  }

  // ── Answer Selection ──
  function selectOption(q, i) {
    answers[String(q.id)] = i;
    delete reviewed[String(q.id)];
    saveState();
    renderQuestion(q);
    refreshSidebarBtns();
    updateStats();
  }

  function clearAnswer() {
    const q = questions[currentIdx];
    delete answers[String(q.id)];
    delete reviewed[String(q.id)];
    saveState();
    renderQuestion(q);
    refreshSidebarBtns();
    updateStats();
  }

  function markReview() {
    const q = questions[currentIdx];
    reviewed[String(q.id)] = true;
    saveState();
    refreshSidebarBtns();
    nextQuestion();
  }

  // ── Stats ──
  function updateStats() {
    const answered = Object.keys(answers).length;
    const rev      = Object.keys(reviewed).length;
    document.getElementById('stat-answered').textContent   = answered;
    document.getElementById('stat-unanswered').textContent = questions.length - answered;
    document.getElementById('stat-review').textContent     = rev;
  }

  // ── Modal ──
  function openSubmitModal() {
    const answered = Object.keys(answers).length;
    const unanswered = questions.length - answered;
    document.getElementById('modal-info').textContent =
      `You have answered ${answered} questions. ${unanswered} questions are unattempted. Are you sure you want to submit?`;
    document.getElementById('modal-overlay').classList.add('show');
  }
  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('show');
  }

  // ── Submit ──
  async function submitTest(auto = false) {
    clearInterval(timerInterval);
    localStorage.removeItem(STORAGE_KEY);

    const question_nums = {};
    questions.forEach(q => { question_nums[String(q.id)] = q.num; });

    const userAnswers = {};
    questions.forEach(q => {
      const qid = String(q.id);
      if (answers[qid] !== undefined) {
        userAnswers[qid] = q.options[answers[qid]];
      }
    });

    const res = await fetch('/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ answers: userAnswers, question_nums }),
    });
    const result = await res.json();
    sessionStorage.setItem('neet_result', JSON.stringify(result));
    window.location.href = '/result';
  }

  init();
</script>
</body>
</html>
