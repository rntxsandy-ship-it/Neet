<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEET Result</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --card: #1a2235;
      --border: #2a3755;
      --accent: #00d4aa;
      --accent2: #4f8aff;
      --danger: #ff4d6d;
      --warn: #ffc145;
      --text: #e8edf7;
      --muted: #8895b0;
      --physics: #4f8aff;
      --chemistry: #ff7c5c;
      --botany: #00d4aa;
      --zoology: #c77dff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Source Sans 3', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--accent);
    }
    .logo span { color: var(--text); }
    .retry-btn {
      background: none;
      border: 1.5px solid var(--accent);
      color: var(--accent);
      border-radius: 8px;
      padding: 7px 20px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .retry-btn:hover { background: rgba(0,212,170,0.1); }

    .page { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    /* ── SCORE HERO ── */
    .score-hero {
      text-align: center;
      padding: 40px 0 32px;
    }
    .score-label {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 3px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .score-value {
      font-family: 'Rajdhani', sans-serif;
      font-size: 5rem;
      font-weight: 700;
      line-height: 1;
    }
    .score-value.positive { color: var(--accent); }
    .score-value.negative { color: var(--danger); }
    .score-sub {
      color: var(--muted);
      margin-top: 6px;
      font-size: 1rem;
    }
    .score-rank {
      display: inline-block;
      margin-top: 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 5px 20px;
      font-size: 0.9rem;
      color: var(--muted);
    }
    .score-rank strong { color: var(--text); }

    /* ── STAT CARDS ── */
    .stat-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin: 28px 0;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 16px;
      text-align: center;
    }
    .stat-card-val {
      font-family: 'Rajdhani', sans-serif;
      font-size: 2.4rem;
      font-weight: 700;
      line-height: 1;
    }
    .stat-card-lbl {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 0.5px;
    }

    /* ── SUBJECT CARDS ── */
    .section-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--muted);
      margin: 28px 0 14px;
      text-transform: uppercase;
    }

    .subject-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 36px;
    }
    .subject-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      border-top: 3px solid;
    }
    .subject-card.Physics   { border-top-color: var(--physics); }
    .subject-card.Chemistry { border-top-color: var(--chemistry); }
    .subject-card.Botany    { border-top-color: var(--botany); }
    .subject-card.Zoology   { border-top-color: var(--zoology); }

    .subj-name {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .subj-score {
      font-family: 'Rajdhani', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .subj-stats {
      display: flex;
      gap: 10px;
      font-size: 0.82rem;
    }
    .mini-stat { display: flex; align-items: center; gap: 4px; color: var(--muted); }
    .mini-stat-dot { width: 8px; height: 8px; border-radius: 2px; }

    /* progress bar */
    .prog-wrap { background: var(--border); border-radius: 4px; height: 6px; margin-top: 10px; overflow: hidden; }
    .prog-bar  { height: 100%; border-radius: 4px; transition: width 0.8s ease; }

    /* ── ANALYSIS TABLE ── */
    .analysis-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .analysis-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .atab {
      padding: 12px 20px;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .atab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .analysis-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    .analysis-table th {
      padding: 11px 14px;
      text-align: left;
      background: var(--surface);
      color: var(--muted);
      font-weight: 600;
      font-size: 0.78rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .analysis-table td {
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      vertical-align: top;
      line-height: 1.5;
    }
    .analysis-table tr:hover td { background: rgba(255,255,255,0.02); }
    .pill {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .pill.correct   { background: rgba(0,212,170,0.12); color: var(--accent); }
    .pill.incorrect { background: rgba(255,77,109,0.12); color: var(--danger); }
    .pill.unattempted { background: var(--border); color: var(--muted); }
    .correct-ans { color: var(--accent); font-size: 0.85rem; margin-top: 3px; }
    .user-ans    { font-size: 0.85rem; }
    .user-ans.wrong { color: var(--danger); }

    #no-result {
      text-align: center;
      padding: 80px 0;
      color: var(--muted);
    }
  </style>
</head>
<body>
<header>
  <div class="logo">NEET <span>RESULT</span></div>
  <button class="retry-btn" onclick="window.location.href='/'">RETAKE TEST</button>
</header>

<div class="page" id="content">
  <div id="no-result" style="display:none">
    <h2 style="font-family:'Rajdhani',sans-serif;font-size:1.8rem;margin-bottom:8px">No result found</h2>
    <p>Please complete a test first.</p>
  </div>
</div>

<script>
const SUBJECTS = ['Physics','Chemistry','Botany','Zoology'];
const SUBJ_COLORS = { Physics:'#4f8aff', Chemistry:'#ff7c5c', Botany:'#00d4aa', Zoology:'#c77dff' };

const raw = sessionStorage.getItem('neet_result');
if (!raw) {
  document.getElementById('no-result').style.display = 'block';
} else {
  const data = JSON.parse(raw);
  render(data);
}

function render(data) {
  const pct = Math.round((data.correct / data.total) * 100);
  const content = document.getElementById('content');

  content.innerHTML = `
    <div class="score-hero">
      <div class="score-label">YOUR SCORE</div>
      <div class="score-value ${data.score >= 0 ? 'positive' : 'negative'}">${data.score}</div>
      <div class="score-sub">out of ${data.total * 4} &nbsp;|&nbsp; ${pct}% accuracy</div>
      <div class="score-rank">Correct: <strong>${data.correct}</strong> &nbsp;·&nbsp; Incorrect: <strong>${data.incorrect}</strong> &nbsp;·&nbsp; Unattempted: <strong>${data.unattempted}</strong></div>
    </div>

    <div class="stat-cards">
      <div class="stat-card">
        <div class="stat-card-val" style="color:var(--accent)">${data.score}</div>
        <div class="stat-card-lbl">TOTAL SCORE</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-val" style="color:var(--accent)">${data.correct}</div>
        <div class="stat-card-lbl">CORRECT</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-val" style="color:var(--danger)">${data.incorrect}</div>
        <div class="stat-card-lbl">INCORRECT</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-val" style="color:var(--muted)">${data.unattempted}</div>
        <div class="stat-card-lbl">UNATTEMPTED</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-val" style="color:var(--accent2)">${pct}%</div>
        <div class="stat-card-lbl">ACCURACY</div>
      </div>
    </div>

    <div class="section-title">Subject-wise Breakdown</div>
    <div class="subject-grid" id="subj-grid"></div>

    <div class="section-title">Detailed Analysis</div>
    <div class="analysis-wrap">
      <div class="analysis-tabs" id="atabs"></div>
      <div id="analysis-content"></div>
    </div>
  `;

  // Subject cards
  const subjGrid = document.getElementById('subj-grid');
  SUBJECTS.forEach(subj => {
    const s = data.subject_stats[subj] || {};
    const total = (s.correct||0) + (s.incorrect||0) + (s.unattempted||0) || 45;
    const bar = Math.round(((s.correct||0)/total)*100);
    subjGrid.innerHTML += `
      <div class="subject-card ${subj}">
        <div class="subj-name">${subj.toUpperCase()}</div>
        <div class="subj-score" style="color:${SUBJ_COLORS[subj]}">${s.score || 0}</div>
        <div class="subj-stats">
          <div class="mini-stat"><div class="mini-stat-dot" style="background:var(--accent)"></div>${s.correct||0} correct</div>
          <div class="mini-stat"><div class="mini-stat-dot" style="background:var(--danger)"></div>${s.incorrect||0} wrong</div>
          <div class="mini-stat"><div class="mini-stat-dot" style="background:var(--border)"></div>${s.unattempted||0} skip</div>
        </div>
        <div class="prog-wrap"><div class="prog-bar" style="width:${bar}%;background:${SUBJ_COLORS[subj]}"></div></div>
      </div>`;
  });

  // Analysis tabs
  const tabs = document.getElementById('atabs');
  const allSubjs = ['All', ...SUBJECTS];
  allSubjs.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'atab' + (i === 0 ? ' active' : '');
    btn.textContent = s.toUpperCase();
    btn.addEventListener('click', () => {
      document.querySelectorAll('.atab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTable(s === 'All' ? data.details : data.details.filter(d => d.subject === s));
    });
    tabs.appendChild(btn);
  });

  renderTable(data.details);
}

function renderTable(rows) {
  const tbody = rows.map(d => {
    const userCell = d.result === 'unattempted'
      ? `<span class="user-ans" style="color:var(--muted)">—</span>`
      : `<span class="user-ans ${d.result === 'incorrect' ? 'wrong' : ''}">${d.user_answer || '—'}</span>`;
    return `
      <tr>
        <td style="font-family:'Rajdhani',sans-serif;font-weight:700;color:var(--muted)">${d.num}</td>
        <td>
          <span class="pill" style="background:${getBadgeBg(d.subject)};color:${SUBJ_COLORS[d.subject]};margin-bottom:4px;display:inline-block">${d.subject}</span>
          <div>${d.question}</div>
        </td>
        <td>
          <div class="correct-ans">${d.correct_answer}</div>
          ${userCell}
        </td>
        <td><span class="pill ${d.result}">${d.result.toUpperCase()}</span></td>
        <td style="font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.1rem;color:${d.result==='correct'?'var(--accent)':d.result==='incorrect'?'var(--danger)':'var(--muted)'}">
          ${d.result==='correct'?'+4':d.result==='incorrect'?'−1':'0'}
        </td>
      </tr>`;
  }).join('');

  document.getElementById('analysis-content').innerHTML = `
    <table class="analysis-table">
      <thead>
        <tr>
          <th>#</th><th>Question</th><th>Answers</th><th>Result</th><th>Marks</th>
        </tr>
      </thead>
      <tbody>${tbody}</tbody>
    </table>`;
}

function getBadgeBg(subj) {
  const map = { Physics:'rgba(79,138,255,0.12)', Chemistry:'rgba(255,124,92,0.12)', Botany:'rgba(0,212,170,0.12)', Zoology:'rgba(199,125,255,0.12)' };
  return map[subj] || 'var(--border)';
}
</script>
</body>
</html>
